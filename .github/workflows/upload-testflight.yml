name: Upload IPA to TestFlight

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "EAS IPA download URL"
        required: true

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Download IPA from EAS
        run: curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa

      - name: Write ASC API key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Upload via Transporter
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file app.ipa \
            --apiKey "${{ secrets.ASC_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" \
            --verbose
